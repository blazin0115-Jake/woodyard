<svg viewBox="0 0 740 580" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Woodyard architecture diagram">
  <style>
    .title { font-size: 20px; font-weight: 650; fill: #172033; }
    .label { font-size: 14px; font-weight: 600; fill: #172033; }
    .small { font-size: 12px; fill: #5b6475; }
    .node { stroke: #64748b; stroke-width: 1; }
    .neutral { fill: #e2e8f0; }
    .input { fill: #bfdbfe; }
    .process { fill: #c7d2fe; }
    .storage { fill: #99f6e4; }
    .external { fill: #fde68a; }
    .edge { stroke: #64748b; stroke-width: 1.5; fill: none; }
    .zone { fill: none; stroke: #64748b; stroke-width: 1; stroke-dasharray: 6 5; opacity: 0.8; }
  </style>
  <text x="370" y="28" text-anchor="middle" class="title">Woodyard Architecture</text>
  <text x="370" y="46" text-anchor="middle" class="small">An open, modular workspace for autonomous AI agents</text>

  <rect class="node external" x="200" y="65" width="340" height="44" rx="6" />
  <text x="370" y="84" text-anchor="middle" class="label">LLM Provider</text>
  <text x="370" y="100" text-anchor="middle" class="small">OpenAI · DeepSeek · Any OpenAI-compatible API</text>

  <line class="edge" x1="370" y1="109" x2="370" y2="134" marker-end="url(#arrow)" />

  <rect class="node process" x="120" y="134" width="500" height="52" rx="6" />
  <text x="370" y="155" text-anchor="middle" class="label">AEGIS Protocol</text>
  <text x="370" y="173" text-anchor="middle" class="small">Autonomous Evolutionary Guide &amp; Intelligent Steward</text>

  <line class="edge" x1="370" y1="186" x2="370" y2="210" marker-end="url(#arrow)" />

  <rect class="node neutral" x="40" y="210" width="660" height="110" rx="8" />
  <text x="370" y="226" text-anchor="middle" class="small" fill="#172033">Core Modules</text>

  <rect class="node storage" x="60" y="238" width="190" height="64" rx="5" />
  <text x="155" y="262" text-anchor="middle" class="label">Woodward</text>
  <text x="155" y="280" text-anchor="middle" class="small">Self-Heal · Auto-Restore</text>
  <text x="155" y="294" text-anchor="middle" class="small">Health Monitoring</text>

  <rect class="node storage" x="275" y="238" width="190" height="64" rx="5" />
  <text x="370" y="262" text-anchor="middle" class="label">Tiered Memory</text>
  <text x="370" y="280" text-anchor="middle" class="small">Daily Notes · Long-Term</text>
  <text x="370" y="294" text-anchor="middle" class="small">Self-Improving Logs</text>

  <rect class="node storage" x="490" y="238" width="190" height="64" rx="5" />
  <text x="585" y="262" text-anchor="middle" class="label">Knowledge Cache</text>
  <text x="585" y="280" text-anchor="middle" class="small">API Response Storage</text>
  <text x="585" y="294" text-anchor="middle" class="small">Offline-Readable KB</text>

  <line class="edge" x1="370" y1="320" x2="370" y2="345" marker-end="url(#arrow)" />

  <rect class="node neutral" x="40" y="345" width="660" height="95" rx="8" />
  <text x="370" y="361" text-anchor="middle" class="small" fill="#172033">Quality &amp; Learning Modules</text>

  <rect class="node process" x="80" y="373" width="250" height="52" rx="5" />
  <text x="205" y="395" text-anchor="middle" class="label">UQLM Hallucination Guard</text>
  <text x="205" y="413" text-anchor="middle" class="small">Logprob-Based Confidence Scoring</text>

  <rect class="node process" x="410" y="373" width="250" height="52" rx="5" />
  <text x="535" y="395" text-anchor="middle" class="label">Self-Improving Engine</text>
  <text x="535" y="413" text-anchor="middle" class="small">Correction · Domain Learning · Compounding</text>

  <line class="edge" x1="370" y1="440" x2="370" y2="465" marker-end="url(#arrow)" />

  <rect class="node input" x="120" y="465" width="500" height="44" rx="6" />
  <text x="370" y="484" text-anchor="middle" class="label">Foundation</text>
  <text x="370" y="500" text-anchor="middle" class="small">Python 3.10+ · Scripts · File System · Backup Store</text>

  <rect class="zone" x="25" y="60" width="690" height="470" rx="10" />

  <rect class="node external" x="40" y="545" width="14" height="14" rx="2" />
  <text x="62" y="556" font-size="11" fill="#5b6475">External</text>
  <rect class="node process" x="140" y="545" width="14" height="14" rx="2" />
  <text x="162" y="556" font-size="11" fill="#5b6475">Governance</text>
  <rect class="node storage" x="280" y="545" width="14" height="14" rx="2" />
  <text x="302" y="556" font-size="11" fill="#5b6475">Storage</text>
  <rect class="node input" x="420" y="545" width="14" height="14" rx="2" />
  <text x="442" y="556" font-size="11" fill="#5b6475">Foundation</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>
</svg>
